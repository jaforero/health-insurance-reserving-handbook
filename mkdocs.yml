    - 02 · Construcción de triángulos: part-01-foundations/02-triangle-construction.md
    - 03 · Lags de desarrollo y transformaciones: part-01-foundations/03-development-lags-and-triangle-transformations.md
    - 04 · Triángulos incrementales vs. acumulados: part-01-foundations/04-incremental-vs-cumulative-triangles.md
