site_name: Health Insurance Reserving Handbook
site_description: Manual técnico de IBNR, reserving y modelación actuarial para seguros de salud, con aplicaciones al sistema de salud colombiano.
site_author: Health Insurance Reserving Handbook
site_url: "https://jaforero.github.io/health-insurance-reserving-handbook/"

docs_dir: docs
site_dir: site

theme:
  name: material
  language: es
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro

plugins:
  - search:
      lang:
        - es
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false

nav:
  - Inicio: index.md
  - Gobierno del repositorio:
      - Roadmap: roadmap.md
      - Guía de selección de metodologías: methodology-selection-guide.md
      - Glosario: glossary.md
      - Bibliografía y evidencia: bibliography.md
