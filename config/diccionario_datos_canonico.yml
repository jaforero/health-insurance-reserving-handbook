metadatos:
  nombre: Diccionario canónico de datos para reserving en seguros de salud
  archivo: config/diccionario_datos_canonico.yml
  version: 0.1.0
  estado: borrador_editorial
  idioma_principal: es
  ultima_actualizacion: '2026-07-15'
  proposito: Definir nombres, semántica, tipos, reglas y alias interoperables para datasets de reserving.
  fuente_normativa_interna:
  - docs/repository-governance/marco-preparacion-datos-metodologias-parte-1.md
  - docs/repository-governance/marco-preparacion-datos-metodologias-parte-2.md
convenciones:
  nombres_canonicos: snake_case en español, sin tildes ni caracteres especiales
  alias_ingles: Opcionales; se usan solo para interoperabilidad y claridad
  fechas: 'ISO 8601: YYYY-MM-DD'
  fechas_hora: ISO 8601 con zona horaria
  periodos_mensuales: 'Primer día del mes: YYYY-MM-01'
  moneda: Código ISO 4217
  porcentajes: Decimal entre 0 y 1, salvo que se indique otra cosa
  importes: Valores monetarios en moneda nominal de la fila, salvo ajuste explícito
  campos_derivados: Deben conservar trazabilidad hacia los campos fuente
  valores_nulos: Representan dato desconocido o no aplicable; no equivalen automáticamente a cero
tipos_dato:
  cadena: Texto UTF-8
  entero: Número entero
  decimal: Número decimal
  decimal_no_negativo: Número decimal mayor o igual a cero
  booleano: true o false
  fecha: Fecha ISO 8601
  fecha_hora: Fecha y hora ISO 8601
  categoria: Valor perteneciente a un catálogo
catalogos:
  estado_preparacion:
  - LISTO
  - LISTO_CON_LIMITACIONES
  - EXPLORATORIO
  - BLOQUEADO
  - NO_PERTINENTE
  base_bruta_neta:
  - BRUTA
  - NETA
  tipo_movimiento:
  - PAGO
  - RESERVA_CASO
  - AJUSTE
  - REVERSO
  - RECUPERACION
  - REASEGURO
  - GLOSA
  - COPAGO
  - DEDUCIBLE
  - OTRO
  tipo_obligacion:
  - FEE_FOR_SERVICE
  - FARMACIA
  - CAPITACION
  - PAGO_GLOBAL_PROSPECTIVO
  - EPISODIO
  - GLOSA
  - RECUPERACION
  - REASEGURO
  - ALTO_COSTO
  - OTRA
  estado_reclamacion:
  - RADICADA
  - EN_REVISION
  - ADJUDICADA
  - PAGADA_PARCIAL
  - PAGADA_TOTAL
  - GLOSADA
  - EN_CONTROVERSIA
  - CERRADA
  - REABIERTA
  - ANULADA
  periodicidad:
  - DIARIA
  - SEMANAL
  - MENSUAL
  - TRIMESTRAL
  - ANUAL
  moneda:
  - COP
  - USD
  - EUR
  - GBP
  - CAD
  - AUD
  - JPY
  metodo_reserving:
  - CHAIN_LADDER_PAGADO
  - CHAIN_LADDER_INCURRIDO
  - BORNHUETTER_FERGUSON
  - BENKTANDER
  - CAPE_COD
  - PMPM
  - MACK
  - BOOTSTRAP
  - GLM
  - GAM
  - BAYES
  - SUPERVIVENCIA
  - MULTIESTADO
  - FRECUENCIA_SEVERIDAD
  - MACHINE_LEARNING
  - DEVENGO_CONTRACTUAL
dominios:
  D1: Alcance y obligación
  D2: Fechas y estructura temporal
  D3: Medidas económicas
  D4: Identificadores y granularidad
  D5: Historia y madurez
  D6: Exposición
  D7: Priors y expectativas
  D8: Segmentación y homogeneidad
  D9: Operación y contratos
  D10: Validación y gobierno
  DX: Campos derivados para modelación
campos:
  id_evaluacion:
    dominio: D1
    descripcion: Identificador único del ejercicio de preparación o benchmark.
    tipo_dato: cadena
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - assessment_id
    validaciones:
    - no_vacio
    - unico
  fecha_valoracion:
    dominio: D1
    descripcion: Fecha as-of a la cual se estima la obligación.
    tipo_dato: fecha
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - valuation_date
    - as_of_date
    obligatorio_para:
    - TODOS_LOS_METODOS
    validaciones:
    - no_futura_respecto_a_ejecucion
    - formato_iso_8601
  proposito:
    dominio: D1
    descripcion: 'Finalidad del cálculo: reporte, gestión, pricing, solvencia, auditoría u otra.'
    tipo_dato: cadena
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - purpose
  usuario_previsto:
    dominio: D1
    descripcion: Usuario o comité que utilizará el resultado.
    tipo_dato: cadena
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - intended_user
  tipo_obligacion:
    dominio: D1
    descripcion: Naturaleza económica de la obligación.
    tipo_dato: categoria
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - obligation_type
    obligatorio_para:
    - TODOS_LOS_METODOS
    valores_permitidos:
    - FEE_FOR_SERVICE
    - FARMACIA
    - CAPITACION
    - PAGO_GLOBAL_PROSPECTIVO
    - EPISODIO
    - GLOSA
    - RECUPERACION
    - REASEGURO
    - ALTO_COSTO
    - OTRA
  descripcion_obligacion:
    dominio: D1
    descripcion: Descripción precisa del pasivo u obligación que se desea estimar.
    tipo_dato: cadena
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - obligation_description
  medida_objetivo:
    dominio: D1
    descripcion: 'Medida económica objetivo: pagado, incurrido, permitido, contractual u otra.'
    tipo_dato: categoria
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - target_measure
    valores_permitidos:
    - PAGADO
    - INCURRIDO
    - PERMITIDO
    - RECONOCIDO
    - CONTRACTUAL
    - OTRA
  base_bruta_neta:
    dominio: D1
    descripcion: Indica si la estimación se realiza antes o después de recuperaciones y reaseguro.
    tipo_dato: categoria
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - gross_net_basis
    valores_permitidos:
    - BRUTA
    - NETA
  moneda:
    dominio: D1
    descripcion: Moneda funcional de los importes.
    tipo_dato: categoria
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - currency
    valores_permitidos:
    - COP
    - USD
    - EUR
    - GBP
    - CAD
    - AUD
    - JPY
  nivel_materialidad:
    dominio: D1
    descripcion: Umbral cuantitativo o cualitativo usado para evaluar diferencias.
    tipo_dato: decimal_no_negativo
    granularidad: evaluacion
    unidad: moneda_o_porcentaje
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - materiality_level
  segmento_objetivo:
    dominio: D1
    descripcion: Población, producto, contrato o portafolio cubierto por la evaluación.
    tipo_dato: cadena
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - target_segment
  fecha_servicio:
    dominio: D2
    descripcion: Fecha de prestación del servicio de salud.
    tipo_dato: fecha
    granularidad: reclamacion_o_linea
    permite_nulos: false
    dato_sensible: true
    alias_ingles:
    - service_date
    - incurred_date
    - occurrence_date
    obligatorio_para:
    - CHAIN_LADDER_PAGADO
    - CHAIN_LADDER_INCURRIDO
    - GLM
    - GAM
    validaciones:
    - menor_o_igual_a_fecha_valoracion
    - formato_iso_8601
  fecha_ocurrencia:
    dominio: D2
    descripcion: Fecha del evento asegurado cuando difiere de la fecha de servicio.
    tipo_dato: fecha
    granularidad: reclamacion
    permite_nulos: true
    dato_sensible: true
    alias_ingles:
    - occurrence_date
    - loss_date
  fecha_admision:
    dominio: D2
    descripcion: Fecha de ingreso hospitalario.
    tipo_dato: fecha
    granularidad: reclamacion
    permite_nulos: true
    dato_sensible: true
    alias_ingles:
    - admission_date
  fecha_alta:
    dominio: D2
    descripcion: Fecha de egreso hospitalario.
    tipo_dato: fecha
    granularidad: reclamacion
    permite_nulos: true
    dato_sensible: true
    alias_ingles:
    - discharge_date
    validaciones:
    - mayor_o_igual_a_fecha_admision
  fecha_radicacion:
    dominio: D2
    descripcion: Fecha de recepción o radicación de la cuenta.
    tipo_dato: fecha
    granularidad: reclamacion
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - submission_date
    - received_date
  fecha_reporte:
    dominio: D2
    descripcion: Fecha de primer conocimiento de la reclamación.
    tipo_dato: fecha
    granularidad: reclamacion
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - report_date
    - notification_date
  fecha_adjudicacion:
    dominio: D2
    descripcion: Fecha de reconocimiento, liquidación o decisión sobre la reclamación.
    tipo_dato: fecha
    granularidad: reclamacion
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - adjudication_date
  fecha_pago:
    dominio: D2
    descripcion: Fecha del desembolso asociado a una transacción.
    tipo_dato: fecha
    granularidad: transaccion
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - payment_date
    - paid_date
    obligatorio_para:
    - CHAIN_LADDER_PAGADO
    - MACK
    - BOOTSTRAP
    validaciones:
    - mayor_o_igual_a_fecha_servicio
    - menor_o_igual_a_fecha_valoracion
  fecha_contabilizacion:
    dominio: D2
    descripcion: Fecha de reconocimiento en el sistema contable.
    tipo_dato: fecha
    granularidad: transaccion
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - accounting_date
    - posting_date
  fecha_movimiento:
    dominio: D2
    descripcion: Fecha efectiva de un movimiento económico o de estado.
    tipo_dato: fecha
    granularidad: transaccion
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - transaction_date
    - movement_date
  fecha_snapshot:
    dominio: D2
    descripcion: Fecha de corte histórico en que se observó el registro.
    tipo_dato: fecha
    granularidad: snapshot
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - snapshot_date
    - extract_date
    obligatorio_para:
    - MACHINE_LEARNING
    recomendado_para:
    - TODOS_LOS_METODOS
  periodo_origen:
    dominio: D2
    descripcion: Periodo agregado de origen derivado de la fecha de servicio u ocurrencia.
    tipo_dato: fecha
    granularidad: celda_triangular
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - origin_period
    - accident_period
    derivacion: truncar fecha_origen según periodicidad
  periodo_calendario:
    dominio: D2
    descripcion: Periodo calendario asociado a pago, reconocimiento o movimiento.
    tipo_dato: fecha
    granularidad: celda_triangular
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - calendar_period
    derivacion: truncar fecha_calendario según periodicidad
  edad_desarrollo:
    dominio: D2
    descripcion: Número de periodos entre origen y calendario.
    tipo_dato: entero
    granularidad: celda_triangular
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - development_age
    - development_lag
    validaciones:
    - mayor_o_igual_a_cero
    derivacion: diferencia_periodos(periodo_calendario, periodo_origen)
  periodicidad:
    dominio: D2
    descripcion: Unidad temporal del triángulo o análisis.
    tipo_dato: categoria
    granularidad: evaluacion
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - periodicity
    - frequency
    valores_permitidos:
    - DIARIA
    - SEMANAL
    - MENSUAL
    - TRIMESTRAL
    - ANUAL
  valor_facturado:
    dominio: D3
    descripcion: Importe presentado por el prestador.
    tipo_dato: decimal
    granularidad: linea_o_transaccion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - billed_amount
    - charge_amount
  valor_permitido:
    dominio: D3
    descripcion: Importe permitido según contrato o reglas de cobertura.
    tipo_dato: decimal
    granularidad: linea_o_transaccion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - allowed_amount
  valor_reconocido:
    dominio: D3
    descripcion: Importe aceptado para pago o devengo.
    tipo_dato: decimal
    granularidad: linea_o_transaccion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - approved_amount
    - recognized_amount
  costo_pagado:
    dominio: D3
    descripcion: Importe incremental efectivamente pagado.
    tipo_dato: decimal
    granularidad: transaccion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - paid_amount
    - payment_amount
    obligatorio_para:
    - CHAIN_LADDER_PAGADO
    - MACK
    - BOOTSTRAP
  reserva_caso:
    dominio: D3
    descripcion: Reserva de caso vigente a la fecha de snapshot.
    tipo_dato: decimal
    granularidad: reclamacion_snapshot
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - case_reserve
    - case_outstanding
    obligatorio_para:
    - CHAIN_LADDER_INCURRIDO
  costo_incurrido:
    dominio: D3
    descripcion: Medida incurrida, normalmente costo pagado más reserva de caso.
    tipo_dato: decimal
    granularidad: reclamacion_snapshot
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - incurred_amount
    obligatorio_para:
    - CHAIN_LADDER_INCURRIDO
    derivacion: costo_pagado_acumulado + reserva_caso
  valor_recuperacion:
    dominio: D3
    descripcion: Recuperación distinta de reaseguro.
    tipo_dato: decimal
    granularidad: transaccion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - recovery_amount
    - subrogation_amount
  valor_reaseguro:
    dominio: D3
    descripcion: Importe cedido o recuperable de reaseguro.
    tipo_dato: decimal
    granularidad: transaccion_o_reclamacion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - reinsurance_amount
  valor_glosa:
    dominio: D3
    descripcion: Importe objetado o glosado.
    tipo_dato: decimal
    granularidad: transaccion_o_reclamacion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - denied_amount
    - disputed_amount
  valor_reverso:
    dominio: D3
    descripcion: Importe de reversión de una transacción previa.
    tipo_dato: decimal
    granularidad: transaccion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - reversal_amount
  valor_copago:
    dominio: D3
    descripcion: Importe a cargo del afiliado por copago.
    tipo_dato: decimal
    granularidad: linea_o_reclamacion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - copay_amount
  valor_deducible:
    dominio: D3
    descripcion: Importe a cargo del afiliado por deducible.
    tipo_dato: decimal
    granularidad: linea_o_reclamacion
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - deductible_amount
  costo_bruto:
    dominio: D3
    descripcion: Costo antes de recuperaciones y reaseguro.
    tipo_dato: decimal
    granularidad: reclamacion_o_periodo
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - gross_cost
    - gross_loss
  costo_neto:
    dominio: D3
    descripcion: Costo después de recuperaciones y reaseguro conforme a la definición del análisis.
    tipo_dato: decimal
    granularidad: reclamacion_o_periodo
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - net_cost
    - net_loss
    derivacion: costo_bruto - valor_recuperacion - valor_reaseguro
  importe_incremental:
    dominio: D3
    descripcion: Importe observado durante una celda de origen y desarrollo.
    tipo_dato: decimal
    granularidad: celda_triangular
    unidad: moneda
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - incremental_amount
    - incremental_loss
    obligatorio_para:
    - BOOTSTRAP
    - GLM
    - GAM
  importe_acumulado:
    dominio: D3
    descripcion: Importe acumulado hasta una edad de desarrollo.
    tipo_dato: decimal
    granularidad: celda_triangular
    unidad: moneda
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - cumulative_amount
    - cumulative_loss
    obligatorio_para:
    - CHAIN_LADDER_PAGADO
    - CHAIN_LADDER_INCURRIDO
    - MACK
  conteo_reclamaciones:
    dominio: D3
    descripcion: Número de reclamaciones o eventos según definición.
    tipo_dato: entero
    granularidad: celda_o_periodo
    unidad: reclamaciones
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - claim_count
    - frequency
  conteo_servicios:
    dominio: D3
    descripcion: Número de servicios o líneas de atención.
    tipo_dato: entero
    granularidad: celda_o_periodo
    unidad: servicios
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - service_count
  id_reclamacion:
    dominio: D4
    descripcion: Identificador único de la reclamación.
    tipo_dato: cadena
    granularidad: reclamacion
    permite_nulos: false
    dato_sensible: true
    alias_ingles:
    - claim_id
    obligatorio_para:
    - SUPERVIVENCIA
    - MULTIESTADO
    - FRECUENCIA_SEVERIDAD
    - MACHINE_LEARNING
    validaciones:
    - no_vacio
  id_transaccion:
    dominio: D4
    descripcion: Identificador único del movimiento económico.
    tipo_dato: cadena
    granularidad: transaccion
    permite_nulos: false
    dato_sensible: true
    alias_ingles:
    - transaction_id
    recomendado_para:
    - TODOS_LOS_METODOS
    validaciones:
    - unico_dentro_de_fuente
  id_factura:
    dominio: D4
    descripcion: Identificador de la factura o cuenta médica.
    tipo_dato: cadena
    granularidad: factura
    permite_nulos: true
    dato_sensible: true
    alias_ingles:
    - invoice_id
    - bill_id
  id_folio:
    dominio: D4
    descripcion: Identificador de subregistro, línea o folio.
    tipo_dato: cadena
    granularidad: linea
    permite_nulos: true
    dato_sensible: true
    alias_ingles:
    - line_id
    - folio_id
  id_miembro:
    dominio: D4
    descripcion: Identificador seudonimizado del afiliado o miembro.
    tipo_dato: cadena
    granularidad: miembro
    permite_nulos: true
    dato_sensible: true
    alias_ingles:
    - member_id
    - patient_id
  id_prestador:
    dominio: D4
    descripcion: Identificador del prestador.
    tipo_dato: cadena
    granularidad: prestador
    permite_nulos: true
    dato_sensible: true
    alias_ingles:
    - provider_id
  id_contrato:
    dominio: D4
    descripcion: Identificador del contrato.
    tipo_dato: cadena
    granularidad: contrato
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - contract_id
  id_producto:
    dominio: D4
    descripcion: Identificador del producto, plan o cobertura.
    tipo_dato: cadena
    granularidad: producto
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - product_id
    - plan_id
  id_snapshot:
    dominio: D4
    descripcion: Identificador único del corte histórico.
    tipo_dato: cadena
    granularidad: snapshot
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - snapshot_id
    recomendado_para:
    - TODOS_LOS_METODOS
  archivo_fuente:
    dominio: D4
    descripcion: Nombre o ruta lógica del archivo de origen.
    tipo_dato: cadena
    granularidad: registro
    permite_nulos: false
    dato_sensible: false
    alias_ingles:
    - source_file
  sistema_fuente:
    dominio: D4
    descripcion: Sistema transaccional o repositorio del cual proviene el registro.
    tipo_dato: cadena
    granularidad: registro
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - source_system
  tipo_movimiento:
    dominio: D4
    descripcion: Clasificación económica y operativa del movimiento.
    tipo_dato: categoria
    granularidad: transaccion
