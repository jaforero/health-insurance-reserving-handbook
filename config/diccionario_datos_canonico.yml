    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - observed_pmpm
    derivacion: costo / miembros_mes
  frecuencia_observada:
    dominio: DX
    descripcion: Reclamaciones por unidad de exposición.
    tipo_dato: decimal_no_negativo
    granularidad: periodo_segmento
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - observed_frequency
    derivacion: conteo_reclamaciones / exposicion
  severidad_observada:
    dominio: DX
    descripcion: Costo promedio por reclamación.
    tipo_dato: decimal
    granularidad: periodo_segmento
    unidad: moneda_por_reclamacion
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - observed_severity
    derivacion: costo / conteo_reclamaciones
  reserva_estimada:
    dominio: DX
    descripcion: Reserva estimada por un método.
    tipo_dato: decimal
    granularidad: resultado_metodo
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - estimated_reserve
  ultimate_estimado:
    dominio: DX
    descripcion: Costo ultimate estimado.
    tipo_dato: decimal
    granularidad: resultado_metodo
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - estimated_ultimate
  error_runoff:
    dominio: DX
    descripcion: Diferencia entre estimación histórica y resultado posterior.
    tipo_dato: decimal
    granularidad: resultado_backtest
    unidad: moneda
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - runoff_error
    derivacion: estimacion_historica - resultado_maduro
  error_porcentual_absoluto:
    dominio: DX
    descripcion: Error absoluto como proporción del resultado maduro.
    tipo_dato: decimal_no_negativo
    granularidad: resultado_backtest
    unidad: proporcion
    permite_nulos: true
    dato_sensible: false
    alias_ingles:
    - absolute_percentage_error
    derivacion: abs(estimacion - resultado_maduro) / resultado_maduro
reglas_globales:
  fechas:
  - fecha_origen <= fecha_calendario
  - fecha_calendario <= fecha_valoracion
  - fecha_prior <= fecha_valoracion
  - fecha_snapshot <= fecha_valoracion para evaluaciones históricas
  importes:
  - Los valores negativos deben clasificarse mediante tipo_movimiento.
  - Los importes nulos no deben reemplazarse por cero sin una regla explícita.
  - La moneda debe ser consistente o convertirse mediante una tabla trazable.
  identificadores:
  - id_transaccion debe ser único dentro de sistema_fuente y version_registro.
  - Los identificadores personales deben seudonimizarse antes de análisis.
  - La deduplicación debe diferenciar copias técnicas de movimientos económicos legítimos.
  as_of:
  - Ninguna variable usada para predecir puede tener fecha posterior a fecha_valoracion.
  - Los priors utilizados en backtesting deben ser ex ante.
  - Los snapshots deben conservarse de forma inmutable o versionada.
  exposicion:
  - La exposición debe cubrir el mismo perímetro que los costos.
  - No se deben sumar exposiciones replicadas por joins uno-a-muchos.
